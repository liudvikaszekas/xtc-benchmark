name: prompt_refinement_blackwell
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - pillow
  - tqdm
  - pytorch::pytorch>=2.4.0
  - pytorch::torchvision>=0.19.0
  - pytorch::pytorch-cuda=12.4
  # Additional dependencies for prompt generation
  - pandas
  - networkx
  - matplotlib
  - pip:
    # VLLM for LLM inference (same as attribute_generation)
    - vllm>=0.6.0
    - pydantic>=2.0.0
    - outlines>=0.0.34
    # GenerateAnyScene dependencies for PSGEval
    - inflect
    - sentence-transformers
